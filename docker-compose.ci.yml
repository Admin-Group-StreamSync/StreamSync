# docker-compose.ci.yml — Entorn de tests en CI (GitHub Actions)
# Us: docker compose -f docker-compose.ci.yml up --build --abort-on-container-exit

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: streamsync
      POSTGRES_PASSWORD: streamsync
      POSTGRES_DB: streamsync_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamsync"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      target: runtime
    environment:
      DATABASE_URL: postgresql://streamsync:streamsync@db:5432/streamsync_test
      DJANGO_SETTINGS_MODULE: streamsync.settings_test
      SECRET_KEY: ci-secret-key-not-for-production
    depends_on:
      db:
        condition: service_healthy
    # En CI no arranquem Gunicorn, sol correm els tests y sortim
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py migrate --check &&
        pytest tests/ --tb=short --cov=. --cov-omit='*/migrations/*,*/settings*,manage.py' --cov-fail-under=80
      "