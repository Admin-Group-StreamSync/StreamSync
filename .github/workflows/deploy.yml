name: Django CD

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    PYTHON_VERSION: "3.11"

jobs:
  # Lint & tipos
  lint-and-types:
      name: Lint & types
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python ${{ env.PYTHON_VERSION }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}
            cache: pip
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: flake8 — estilo y errores de sintaxis
          run: flake8 . --max-line-length=119 --exclude=migrations,__pycache__
        - name: mypy — comprobación de tipos
          env:
            DJANGO_SETTINGS_MODULE: streamsync.settings_test
          run: mypy . --ignore-missing-imports --exclude migrations

  # Unit tests (dins de docker i de SQLite)
  unit-tests:
    name: Unit tests (Docker)
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - uses: actions/checkout@v4

      #runtime del Dockerfile
      - name: Build imatge Docker
        run: |
          docker build \
            --target runtime \
            --tag streamsync:ci \
            --build-arg SECRET_KEY=ci-build-dummy-key \
            .
      #Llança pytests dins del contenidor
      - name: Run unit tests dins del contenidor
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=streamsync.settings_test \
            -e SECRET_KEY=ci-secret-key-not-for-production \
            streamsync:ci \
            pytest tests/unit/ \
              --tb=short \
              --cov=. \
              --cov-omit="*/migrations/*,*/settings*,manage.py" \
              --cov-report=term-missing \
              --cov-fail-under=80
  #Tests d'integració
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Aixecar l'stack de CI amb Docker Compose
        run: |
          docker compose -f docker-compose.django.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from web
      - name: Netejar contenidors de CI
        if: always()
        run: docker compose -f docker-compose.django.yml down -v
  #Docker build & push a ghcr.io
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: integration-tests
    # sol fa push a push a main
    if: github.event_name == 'push' && github.ref == 'refs/head/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_digst: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      #habilita buildkit per builds multietapes + eficients
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in al registry (ghcr.io)
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extreure metadata (tag = git SHA)
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            tags: |
              type=sha,format=long
              type=raw,value=latest,enable=true
      - name: Build y push imagen Docker
          id: push
          uses: docker/build-push-action@v5
          with:
            context: .
            target: runtime
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            # Caché de capas entre builds (acelera builds sucesivos)
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              SECRET_KEY=build-time-dummy-key

