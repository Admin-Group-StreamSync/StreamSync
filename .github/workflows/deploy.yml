name: Django CD

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    PYTHON_VERSION: "3.11"

jobs:
  # Lint & tipos
  lint-and-types:
      name: Lint & types
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python ${{ env.PYTHON_VERSION }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}
            cache: pip
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: flake8 — estilo y errores de sintaxis
          run: flake8 . --max-line-length=119 --exclude=migrations,__pycache__
        - name: mypy — comprobación de tipos
          env:
            DJANGO_SETTINGS_MODULE: streamsync.settings_test
          run: mypy . --ignore-missing-imports --exclude migrations
