name: Django CD

on:
  push:
    branches: ["master"]

jobs:
  run-django:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'  # your Python version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django server in background
      run: |
        mkdir -p logs
        nohup python manage.py runserver 0.0.0.0:8000 > logs/django.log 2>&1 &
        echo "Django server started in background. Logs: logs/django.log"

    - name: Show server logs (optional)
      run: tail -f logs/django.log # Comentario
          
