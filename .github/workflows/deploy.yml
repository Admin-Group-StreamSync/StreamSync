name: Continuous Deployment (CD)

# El CD suele ejecutarse después de que el CI pasa exitosamente en la rama principal.
on:
  push:
    branches:
      - main
  # También permite ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Simular configuración de entorno
        run: |
          echo "Preparando entorno de despliegue para StreamSync..."
          echo "Nota: Pendiente configurar variables de entorno reales (API_KEYS, DB_USER)."

      - name: Simular construcción de la imagen (Docker)
        run: |
          echo "Simulando: docker build -t streamsync-app:latest ."
          echo "Construcción exitosa (Simulada)."

      - name: Simular despliegue en servidor
        run: |
          echo "Simulando conexión SSH al servidor de producción..."
          echo "Simulando: docker run -d -p 80:80 streamsync-app:latest"
          echo "¡Despliegue simulado completado con éxito! La web estaría en vivo."