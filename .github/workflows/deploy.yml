name: Django CD

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    PYTHON_VERSION: "3.11"

jobs:
  # Lint & tipos
  lint-and-types:
      name: Lint & types
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python ${{ env.PYTHON_VERSION }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}
            cache: pip
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: flake8 — estilo y errores de sintaxis
          run: flake8 . --max-line-length=119 --exclude=migrations,__pycache__
        - name: mypy — comprobación de tipos
          env:
            DJANGO_SETTINGS_MODULE: streamsync.settings_test
          run: mypy . --ignore-missing-imports --exclude migrations

  # Unit tests (dins de docker i de SQLite)
  unit-tests:
    name: Unit tests (Docker)
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - uses: actions/checkout@v4

      #runtime del Dockerfile
      - name: Build imatge Docker
        run: |
          docker build \
            --target runtime \
            --tag streamsync:ci \
            --build-arg SECRET_KEY=ci-build-dummy-key \
            .
      #Llança pytests dins del contenidor
      - name: Run unit tests dins del contenidor
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=streamsync.settings_test \
            -e SECRET_KEY=ci-secret-key-not-for-production \
            streamsync:ci \
            pytest tests/unit/ \
              --tb=short \
              --cov=. \
              --cov-omit="*/migrations/*,*/settings*,manage.py" \
              --cov-report=term-missing \
              --cov-fail-under=80
  #Tests d'integració
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Aixecar l'stack de CI amb Docker Compose
        run: |
          docker compose -f docker-compose.django.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from web
      - name: Netejar contenidors de CI
        if: always()
        run: docker compose -f docker-compose.django.yml down -v
  #Docker build & push a ghcr.io
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: integration-tests
    # Sol fa push en push a main, no en PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      # Habilita BuildKit pel builds multistage mes eficients
      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in al registry (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extreure metadata (tag = git SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=true

      - name: Build y push imatge Docker
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caché de capes entre builds (accelera builds successius)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SECRET_KEY=build-time-dummy-key

  # Deploy → Staging
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging

    steps:
      - name: Deploy a staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_STAGING }}
          username: ${{ secrets.SSH_USER_STAGING }}
          key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          script: |
            set -e
            cd /app/streamsync

          # Escriu el fitxer .env.prod amb els valors d'staging
            cat > .env.prod <<EOF
            SECRET_KEY=${{ secrets.SECRET_KEY_STAGING }}
            DATABASE_URL=postgresql://${{ secrets.DB_USER_STAGING }}:${{ secrets.DB_PASSWORD_STAGING }}@db:5432/${{ secrets.DB_NAME_STAGING }}
            DJANGO_SETTINGS_MODULE=streamsync.settings_production
            ALLOWED_HOSTS=staging.streamsync.internal,localhost
            DEBUG=False
            EOF
 
          # Variables d'entorn per docker-compose.prod.yml
            export IMAGE_TAG=${{ needs.docker-build-push.outputs.image_tag }}
            export DB_USER=${{ secrets.DB_USER_STAGING }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD_STAGING }}
            export DB_NAME=${{ secrets.DB_NAME_STAGING }}
 
          # Login en ghcr.io desde el servidor
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
 
          # Descarga la nova imatge 
            docker compose -f docker-compose.prod.yml pull web
 
          # Aplica migracions abans de redirigir el trafic
            docker compose -f docker-compose.prod.yml run --rm web \
              python manage.py migrate --noinput
 
          # Verifica que no quedin migracions pendents
            docker compose -f docker-compose.prod.yml run --rm web \
              python manage.py migrate --check
 
          # Aixeca / actualiza els contenedors sense downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
 
          # Elimina imatges antigues per no plenar el disc
            docker image prune -f
      - name: Smoke tests (staging)
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            https://staging.streamsync.internal/health/
          curl --fail \
            "https://staging.streamsync.internal/api/v1/movies/?limit=1" \
            -H "X-API-KEY: ${{ secrets.API_KEY_STAGING }}"

  #Aprobació manual
  approval-gate:
    name: Manual approval gate
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Requiere configurar un reviewer en:
    # GitHub → Settings → Environments → production-gate
    environment: production-gate
    steps:
      - name: Aprobación recibida
        run: echo " Aprobat — iniciant deploy a prod."
  #Deploy → Production
  deploy-production:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [approval-gate, docker-build-push]
    environment: production

    steps:
      - name: Deploy a producción via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PROD }}
          username: ${{ secrets.SSH_USER_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          script: |
            set -e
            cd /app/streamsync

          # Guarda el tag actual per poder fer rollback si algo falla
            PREVIOUS_TAG=$(docker compose -f docker-compose.prod.yml \
              ps -q web 2>/dev/null \
              | xargs docker inspect --format='{{.Config.Image}}' 2>/dev/null \
              | head -1 || echo "")
 
          # Escriu el fitxer .env.prod amb els valors de prod
            cat > .env.prod <<EOF
            SECRET_KEY=${{ secrets.SECRET_KEY_PROD }}
            DATABASE_URL=postgresql://${{ secrets.DB_USER_PROD }}:${{ secrets.DB_PASSWORD_PROD }}@db:5432/${{ secrets.DB_NAME_PROD }}
            DJANGO_SETTINGS_MODULE=streamsync.settings_production
            ALLOWED_HOSTS=streamsync.com,www.streamsync.com
            DEBUG=False
            EOF
 
            # Variables d'entorn per docker-compose.prod.yml
            export IMAGE_TAG=${{ needs.docker-build-push.outputs.image_tag }}
            export DB_USER=${{ secrets.DB_USER_PROD }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }}
            export DB_NAME=${{ secrets.DB_NAME_PROD }}
 
            # Login en ghcr.io desde el servidor
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
 
            # Descarga la nova imatge
            docker compose -f docker-compose.prod.yml pull web
 
            # Aplica migracions avans de redirigir el trafic
            docker compose -f docker-compose.prod.yml run --rm web \
              python manage.py migrate --noinput
 
            # Aixeca la nova versió
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
 
            # Django check intern post-deploy
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T web \
              python manage.py check --deploy || {
                echo " Django check fallido — fent rollback a $PREVIOUS_TAG ..."
                export IMAGE_TAG=$PREVIOUS_TAG
                docker compose -f docker-compose.prod.yml up -d
                exit 1
              }
 
            # Neteja imatges antigues
            docker image prune -f

      - name: Health checks externs (prod)
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            https://streamsync.com/health/
          curl --fail \
            "https://streamsync.com/api/v1/movies/?limit=1" \
            -H "X-API-KEY: ${{ secrets.API_KEY_PROD }}"

  #Notificació post-deploy
  notify-deploy:
    name: Notificació post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-production,docker-build-push]
    if: always()
    steps:
      - name: Notificara Resultat
        env:
          STATUS: ${{ needs.deploy-production.result }}
          IMAGE: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          if [ "$STATUS" = "success" ]; then
            echo " Deploy exitos: $IMAGE"
            # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            #   -H 'Content-type: application/json' \
            #   -d '{"text":"StreamSync desplegat correctament: '"$IMAGE"'"}'
          else
            echo " Deploy fallat: $IMAGE"
            # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            #   -H 'Content-type: application/json' \
            #   -d '{"text":" StreamSync deploy FALLIT: '"$IMAGE"'"}'
          fi

