name: Django CD

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]
env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    PYTHON_VERSION: "3.11"

jobs:
  # Lint & tipos
  lint-and-types:
      name: Lint & types
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - name: Set up Python ${{ env.PYTHON_VERSION }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}
            cache: pip
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: flake8 — estilo y errores de sintaxis
          run: flake8 . --max-line-length=119 --exclude=migrations,__pycache__
        - name: mypy — comprobación de tipos
          env:
            DJANGO_SETTINGS_MODULE: streamsync.settings_test
          run: mypy . --ignore-missing-imports --exclude migrations

  # Unit tests (dins de docker i de SQLite)
  unit-tests:
    name: Unit tests (Docker)
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - uses: actions/checkout@v4

      #runtime del Dockerfile
      - name: Build imatge Docker
        run: |
          docker build \
            --target runtime \
            --tag streamsync:ci \
            --build-arg SECRET_KEY=ci-build-dummy-key \
            .
      #Llança pytests dins del contenidor
      - name: Run unit tests dins del contenidor
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=streamsync.settings_test \
            -e SECRET_KEY=ci-secret-key-not-for-production \
            streamsync:ci \
            pytest tests/unit/ \
              --tb=short \
              --cov=. \
              --cov-omit="*/migrations/*,*/settings*,manage.py" \
              --cov-report=term-missing \
              --cov-fail-under=80
  #Tests d'integració
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Aixecar l'stack de CI amb Docker Compose
        run: |
          docker compose -f docker-compose.django.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from web
      - name: Netejar contenidors de CI
        if: always()
        run: docker compose -f docker-compose.django.yml down -v
  #Docker build & push a ghcr.io
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: integration-tests
    # sol fa push a push a main
    if: github.event_name == 'push' && github.ref == 'refs/head/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_digst: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      #habilita buildkit per builds multietapes + eficients
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in al registry (ghcr.io)
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extreure metadata (tag = git SHA)
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            tags: |
              type=sha,format=long
              type=raw,value=latest,enable=true
      - name: Build y push imagen Docker
          id: push
          uses: docker/build-push-action@v5
          with:
            context: .
            target: runtime
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            # Caché de capas entre builds (acelera builds sucesivos)
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              SECRET_KEY=build-time-dummy-key
  # Deploy i Staging
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging

    steps:
      - uses: actions/checkout@v4
      - name: Configurar kubectl (staging)
        uses: azure/k8s-set-context@v4
        with:
          method: 'kubeconfig'
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      #Corre manage.py migrate fent servir la nova imatge, avans del deploy
      - name: Migrations django a staging
        run: |
          kubectl run django-migrate \
                      --image=${{ needs.docker-build-push.outputs.image_tag }} \
                      --restart=Never \
                      --namespace=staging \
                      --env="DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}" \
                      --env="SECRET_KEY=${{ secrets.SECRET_KEY_STAGING }}" \
                      --env="DJANGO_SETTINGS_MODULE=streamsync.settings_production" \
                      --command -- python manage.py migrate --noinput
                    kubectl wait pod/django-migrate \
                      --for=condition=Ready \
                      --namespace=staging \
                      --timeout=120s
                    kubectl logs pod/django-migrate --namespace=staging
                    kubectl delete pod django-migrate --namespace=staging
      - name: Rolling deploy a staging
        run: |
          kubectl set image deployment/streamsync-api \
            api=${{ needs.docker-build-push.outputs.image_tag }} \
            --namespace=staging
          kubectl rollout status deployment/streamsync-api \
            --namespace=staging \
          --timeout=180s
      - name: Smoke test
        run: |
          sleep 10
          curl --fail https://staging.streamsync.internal/health/
                    curl --fail "https://staging.streamsync.internal/api/v1/movies/?limit=1"
                    # Verifica que no quedan migraciones pendientes en staging
                    kubectl run django-check \
                      --image=${{ needs.docker-build-push.outputs.image_tag }} \
                      --restart=Never \
                      --namespace=staging \
                      --env="DATABASE_URL=${{ secrets.DATABASE_URL_STAGING }}" \
                      --env="SECRET_KEY=${{ secrets.SECRET_KEY_STAGING }}" \
                      --env="DJANGO_SETTINGS_MODULE=streamsync.settings_production" \
                      --command -- python manage.py migrate --check
                    kubectl delete pod django-check --namespace=staging
  #Aprobació manual
  approval-gate:
    name: Manual approval gate
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Requiere configurar un reviewer en:
    # GitHub → Settings → Environments → production-gate
    environment: production-gate
    steps:
      - name: Aprobación recibida
        run: echo " Aprobat — iniciant deploy a prod."
  #Deploy a Production
  deploy-production:
    name: Deploy → production
    runs-on: ubuntu-latest
    needs: [ approval-gate, docker-build-push ]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configurar kubectl (prod)
        uses: azure/k8s-set-context@v4
        with:
          method: 'kubeconfig'
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Migracions a Django prod
        run: |
          kubectl run django-migrate \
            --image=${{ needs.docker-build-push.outputs.image_tag }} \
            --restart=Never \
            --namespace=production \
            --env="DATABASE_URL=${{ secrets.DATABASE_URL_PROD }}" \
            --env="SECRET_KEY=${{ secrets.SECRET_KEY_PROD }}" \
            --env="DJANGO_SETTINGS_MODULE=streamsync.settings_production" \
            --command -- python manage.py migrate --noinput
          kubectl wait pod/django-migrate \
            --for=condition=Ready \
            --namespace=production \
            --timeout=180s
          kubectl logs pod/django-migrate --namespace=production
          kubectl delete pod django-migrate --namespace=production

      - name: Rolling deploy a prod
        run: |
          kubectl set image deployment/streamsync-api \
            api=${{ needs.docker-build-push.outputs.image_tag }} \
            --namespace=production
          kubectl rollout status deployment/streamsync-api \
            --namespace=production \
            --timeout=300s
      - name: Health checks
        run: |
          sleep 15
          curl --fail https://streamsync.com/health/
          curl --fail "https://streamsync.com/api/v1/movies/?limit=1"

      - name: Rollback automatic si fallada
        if: failure()
        run: |
          kubectl rollout undo deployment/streamsync-api --namespace=production
          echo "::error::Deploy a prod fallat — revertint a la versio anterior."
  #Notificació post-deploy
  notify-deploy:
    name: Notificació post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-production,docker-build-push]
    if: always()
    steps:
      - name: Notificara Resultat
        env:
          STATUS: ${{ needs.deploy-production.result }}
          IMAGE: ${{ needs.docker-build-push.outputs.image_tag }}
        run: |
          if [ "$STATUS" = "success" ]; then
            echo " Deploy exitos: $IMAGE"
            # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            #   -H 'Content-type: application/json' \
            #   -d '{"text":"StreamSync desplegat correctament: '"$IMAGE"'"}'
          else
            echo " Deploy fallat: $IMAGE"
            # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            #   -H 'Content-type: application/json' \
            #   -d '{"text":" StreamSync deploy FALLIT: '"$IMAGE"'"}'
          fi

