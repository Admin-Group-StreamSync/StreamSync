name: Metrics Action

on:
  push:
    branches: [
      "master",
     "develop",
     "features/*",
      "111-feat-implement-a-metric-action"
    ]
  pull_request:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.12]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}


    - name: Install libraries
      run: |
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fog Index Metric
      working-directory: .
      run: |
          python3 ./.github/scripts/metrics/fog_comments_index.py . 
          python3 ./.github/scripts/metrics/cyclomatic_complexity_metric.py .
          python .github/scripts/depth_conditional_nesting.py . 
    



    - name: Generate reports artifacts
      uses: actions/upload-artifact@v4
      with:
        name: metric-reports
        path: .github/scripts/reports/
