
name: Run Chart

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
    build:

      runs-on: ubuntu-latest
      strategy:
        max-parallel: 4
        matrix:
          python-version: [3.12]
      steps:
        - uses: actions/checkout@v4
      
        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@v5
          with:
            python-version: ${{ matrix.python-version }}
          
        - name: Install Dependencies
          run: |
            python3 -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pandas matplotlib # Aseguramos las librerías para el gráfico

        - name: Run Tests
          run: |
            python3 manage.py test

        - name: Generate Run Chart
          run: |
            # Aquí llamamos al script que procesa los datos y crea la imagen
            python3 scripts/generate_run_chart.py
