on:
  workflow_dispatch:

jobs:
  issues:
    runs-on: ubuntu-latest

    steps:
      - name: Get issues
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/issues \
          > issues.json

      - name: Upload issues
        uses: actions/upload-artifact@v4
        with:
          name: issues
          path: issues.json