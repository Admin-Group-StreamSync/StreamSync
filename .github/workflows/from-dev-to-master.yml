
name: From develop to master

on:
  pull_request: 
    branches: [develop]
    types: [closed]
#  wsorkflow_dispatch:
      

jobs:
  create-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR
        uses: repo-sync/pull-request@v2
        with:
          source_branch: develop
          destination_branch: master
          pr_title: "[Auto PR]: develop → master"
          pr_body: "Actualización automática desde develop"
          github_token: ${{ secrets.GITHUB_TOKEN }}
