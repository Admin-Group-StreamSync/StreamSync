name: Weekly Issues Created Chart

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta todos los lunes

jobs:
  generate-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch all issues and their creation dates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --state all --limit 10000 --json createdAt > scripts/issues.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install matplotlib

      - name: Run Python script to generate chart
        # Ejecutamos el script desde la raíz
        run: python scripts/runchart_2.py

      - name: Commit and Push the chart
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 🚨 CAMBIO AQUÍ: Añadimos la imagen que ahora se generará dentro de scripts/
          git add scripts/issue_runchart.png
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: update weekly issues chart in scripts folder"
            git push
          else
            echo "No new issues to update the chart. Skipping commit."
          fi