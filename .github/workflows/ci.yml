name: CI Pipeline

on:
  push:
    branches-ignore:
      - main          # main el gestiona el CD; aquí cubrim la resta
    pull_request:
      branches:
        - main          # valida tot PR abans de permetre el merge a main
        - develop
env:
  PYTHON_VERSION: "3.11"
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #Lint i format (falla is hi han errors d'estil o de tipologia)
  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias de lint
        run: pip install flake8 mypy black isort django-stubs djangorestframework-stubs

      - name: black — formato de código
        # Falla si hi ha algun fitxer que black reformatejaria
        run: black --check --diff .
      - name: isort — ordre de imports
        run: isort --check-only --diff .

      - name: flake8 — errors de sintaxis y estil
        run: |
          flake8 . \
            --max-line-length=119 \
            --exclude=migrations,__pycache__,.venv \
            --statistics

      - name: mypy — comprobacio de tipos
        env:
          DJANGO_SETTINGS_MODULE: streamsync.settings_test
          SECRET_KEY: ci-lint-dummy-key
        run: |
          pip install -r requirements.txt   
          mypy . \
            --ignore-missing-imports \
            --exclude migrations \
            --show-error-codes
  #seguretat (Detecta dependencies vulnerables i males practiques en el codig)
  security:
    name: Seguridad
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar eines de seguretat
        run: pip install safety bandit pip-audit

      - name: safety — vulnerabilitats en dependencies
        # comproba requirements.txt contra la base de dades de CVEs de Safety
        run: safety check -r requirements.txt --full-report

      - name: pip-audit — auditoría de paquets instalats
        run: pip-audit -r requirements.txt

      - name: bandit — análisis estatic de seguretat en el códig
        run: |
          bandit -r . \
            --exclude .venv,migrations,tests \
            --severity-level medium \
            --confidence-level medium \
            -f txt
  # Build Docker (verifica que l'imatge es construeix correctament en aquesta rama)
  docker-build:
    name: Docker build (validación)
    runs-on: ubuntu-latest
    # Pot corre en paralel amb lint i security
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false               # CI solo valida, no publica
          tags: streamsync:ci-validate
          # Caché de capes entre execucions del CI (accelera builds)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SECRET_KEY=ci-build-dummy-key
