name: CD – Deploy

on:
  push:
    branches: [main]          # production deploy on merge to main
  workflow_dispatch:           # allow manual trigger
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_API:      ghcr.io/${{ github.repository }}/movies-api

jobs:
  #  Run CI checks first
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml   # reuse the CI workflow

  #  Build & push Docker images
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci-gate
    permissions:
      contents: read
      packages: write
    outputs:
      api_tag:      ${{ steps.meta-api.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://api-staging.moviesplatform.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/movies-platform

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Zero-downtime rolling restart
            docker compose up -d --remove-orphans

            # Run DB migrations / seeds if needed
            docker compose exec -T api node src/migrate.js || true

            # Smoke test
            sleep 5
            curl -f http://localhost:8080/health || (docker compose logs api && exit 1)

      - name: Notify Slack – staging deployed
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🎬 *Movies Platform* staging deploy ${{ job.status == 'success' && '✅ succeeded' || '❌ failed' }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  #  Deploy to production (manual approval required)
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production               # ← GitHub environment protection rule: requires manual approval
      url: https://api.moviesplatform.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/movies-platform

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T api node src/migrate.js || true

            sleep 5
            curl -f http://localhost:8080/health || (docker compose logs api && exit 1)

      - name: Notify Slack – production deployed
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": " *StreamSync API* PRODUCTION deploy ${{ job.status == 'success' && '✅ succeeded' || '❌ FAILED' }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}