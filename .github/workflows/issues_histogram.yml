name: Issues Histogram

on:
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 3:00 AM
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    permissions:
      issues: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib python-decouple

      - name: Run issues histogram script
        working-directory: ./IshikawaTools
        env:
          HISTOGRAM_TOKEN: ${{ secrets.HISTOGRAM_TOKEN }}
        run: python ./histogram.py

      - name: Upload histogram artifact
        uses: actions/upload-artifact@v6
        with:
          name: issues-per-week-graph
          path: IshikawaTools/issues_per_week.png
