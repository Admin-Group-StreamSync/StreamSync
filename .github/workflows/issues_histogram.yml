name: Issues Histogram

on:
  schedule:
    - cron: "50 9 * * *"   # Cada lunes a las 3:00 AM
  workflow_dispatch:      # Permite ejecución manual

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    # IMPORTANTE: Necesitamos permiso de escritura para subir el archivo al repo
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token:  ${{ secrets.HISTOGRAM_TOKEN }}
          

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib python-decouple

      - name: Run issues histogram script
        working-directory: ./IshikawaTools
        env:
          HISTOGRAM_TOKEN: ${{ secrets.HISTOGRAM_TOKEN }}
        run: python ./histogram.py

      - name: Commit and Push changes
        env:
          HISTOGRAM_TOKEN: ${{ secrets.HISTOGRAM_TOKEN }}
        run: |
          # Configurar el usuario de Git (puedes usar el bot de GitHub)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          BRANCH="auto/update-histogram-$(date +%Y%m%d)"
          git checkout -b $BRANCH
                    
          git add IshikawaTools/issues_per_week.png
          if git diff --cached --quiet; then
            echo  "No changes to commit"
          else
            git commit -m "Update issues histogram graph [skip ci]"
            git push origin $BRANCH

            gh pr create \
              --title "Update issues histogram graph" \
              --body "Histogram actualizado automáticamente por GitHub Actions." \
              --base master \
              --head $BRANCH
          fi
