name: Issues Histogram

on:
  schedule:
    - cron: "50 9 * * *"   # Cada lunes a las 3:00 AM
  workflow_dispatch:      # Permite ejecución manual

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    # IMPORTANTE: Necesitamos permiso de escritura para subir el archivo al repo
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token:  ${{ secrets.HISTOGRAM_TOKEN }}
          

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"


      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install matplotlib>=3.7.3 && pip install requests matplotlib python-decouple # comment

      - name: Run script
        working-directory: ./IshikawaTools
        env:
           HISTOGRAM_TOKEN: ${{ secrets.HISTOGRAM_TOKEN }}

        run: git pull && python ./histogram.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ishikawa-chart
          path: IshikawaTools/issues_per_week.png

