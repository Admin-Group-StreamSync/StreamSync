# docker-compose.prod.yml — Referencia de prod
# Us: docker compose -f docker-compose.prod.yml up -d

services:

  # Base de dades
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # En prod la BD NO exposa port al host
    expose:
      - "5432"

  # Aplicacio Django + Gunicorn
  web:
    image: ${IMAGE_TAG}           # imatge construida por el CD y penjada a ghcr.io
    restart: always
    env_file:
      - .env.dev.prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DJANGO_SETTINGS_MODULE: streamsync.settings_production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  #  Nginx  proxy invers + arxius estatics
  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro   # certificats TLS
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: