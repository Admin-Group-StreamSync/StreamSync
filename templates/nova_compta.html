<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card p-4 shadow border-0" style="width: 100%; max-width: 450px;">

            <h2 class="text-center fw-bold mb-4">CREAR COMPTA</h2>

            <form>
                <div class="mb-3">
                    <label class="form-label"><b>Introdueix el teu nom</b></label>
                    <input type="text" class="form-control" placeholder="Nom complet">
                </div>

                <div class="mb-3">
                    <label class="form-label"><b>Introdueix el teu correu electronic</b></label>
                    <input type="email" class="form-control" placeholder="exemple@correu.com">
                </div>

                <div class="mb-3">
                    <label class="form-label"><b>Introdueix la teva contrassenya</b></label>
                    <input type="password" class="form-control">
                </div>

                <div class="mb-4">
                    <label class="form-label"><b>Repeteix la contrassenya</b></label>
                    <input type="password" class="form-control">
                </div>

                <a href="{% url 'sign_in2' %}" class="btn btn-primary w-100 fw-bold">
                    SEGÜENT
                </a>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
