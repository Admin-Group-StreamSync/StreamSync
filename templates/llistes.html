<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSync - Les Meves Llistes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }

        /* Efecto de "pila" de portadas para las listas */
        .lista-stack {
            position: relative;
            width: 150px;
            height: 200px;
            margin: 0 auto;
        }
        .stack-base, .stack-top {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }
        .stack-base {
            background-color: #e9ecef;
            top: -8px;
            right: -8px;
            z-index: 1;
        }
        .stack-top {
            background-color: #ffffff;
            top: 0;
            left: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Estilo para el botón de lista nueva */
        .btn-new-list .stack-top {
            border: 2px dashed #0d6efd;
            color: #0d6efd;
            background-color: #f0f7ff;
        }
        .btn-new-list:hover .stack-top {
            background-color: #0d6efd;
            color: white;
        }

        .list-title {
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
        }

        /* Contenedor del buscador central */
        .search-container-large {
            padding: 40px 0;
            border-bottom: 2px solid #eee;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-house"></i></a>
            <div class="navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active fw-bold" href="#">Llistes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Series</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pelicules</a></li>
                    <li class="nav-item"><a class="nav-link" href="#"><i class="bi bi-person-circle"></i></a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="mb-3">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Enrere
            </a>
        </div>

        <div class="search-container-large text-center">
            <h2 class="mb-4 fw-bold">Les Meves Llistes</h2>
            <div class="input-group mx-auto shadow-sm" style="max-width: 600px;">
                <input type="text" class="form-control form-control-lg" placeholder="Busca entre les teves llistes...">
                <button class="btn btn-primary px-4"><i class="bi bi-search"></i></button>
            </div>
        </div>

        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-5 justify-content-center">

            <div class="col">
                <a href="#" class="text-decoration-none text-dark">
                    <div class="lista-stack">
                        <div class="stack-base shadow-sm"></div>
                        <div class="stack-top">
                            <i class="bi bi-collection-play fs-1 text-secondary opacity-50"></i>
                        </div>
                    </div>
                    <div class="list-title">Favorits 2026</div>
                </a>
            </div>

            <div class="col">
                <a href="#" class="text-decoration-none text-dark">
                    <div class="lista-stack">
                        <div class="stack-base shadow-sm"></div>
                        <div class="stack-top">
                            <i class="bi bi-collection-play fs-1 text-secondary opacity-50"></i>
                        </div>
                    </div>
                    <div class="list-title">Per veure</div>
                </a>
            </div>

            <div class="col">
                <a href="#" class="text-decoration-none btn-new-list">
                    <div class="lista-stack">
                        <div class="stack-base"></div>
                        <div class="stack-top">
                            <i class="bi bi-plus-lg fs-1"></i>
                        </div>
                    </div>
                    <div class="list-title text-primary">Nova Llista</div>
                </a>
            </div>

            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
