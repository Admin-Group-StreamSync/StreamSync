{% extends 'base.html' %}
{% block content %}
<div class="login-container">
    <div class="card shadow p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Login Gestors</h2>
            <p class="text-muted">Introdueix les credencials facilitades per l'administrador</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-dark w-100">Entrar al Dashboard</button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="small">Tornar al login d'usuari</a>
        </div>
    </div>
</div>
{% endblock %}
