<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - StreamSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .sidebar-link {
            text-decoration: none;
            color: black;
            display: block;
            padding: 10px;
            border-radius: 5px;
        }
        .sidebar-link:hover {
            background-color: #e9ecef;
        }
        .sidebar-link.active {
            background-color: #dee2e6;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Inicio</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Llistes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Series</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pelicules</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="fw-bold">PERFIL</h2>
        <hr class="border-2 opacity-75">

        <div class="row mt-4">
            <div class="col-md-3 border-end">
                <div class="mb-4">
                    <a href="#" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Enrere
                    </a>
                </div>

                <nav>
                    <a href="#" class="sidebar-link active mb-2">
                        <i class="bi bi-person-fill"></i> Informació de perfil
                    </a>
                    <a href="#" class="sidebar-link">
                        <i class="bi bi-gear-fill"></i> Preferències de contingut
                    </a>
                </nav>
            </div>

            <div class="col-md-9 ps-md-5">
                <div class="d-flex align-items-center mb-4">
                    <i class="bi bi-person-circle fs-1 me-3"></i>
                    <div>
                        <h3 class="mb-0">Perfil</h3>
                        <p class="text-muted">Gestiona la teva información</p>
                    </div>
                </div>

                <form>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nom</label>
                        <input type="text" class="form-control" value="El teu nom aquí" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Mail</label>
                        <input type="email" class="form-control" value="usuari@exemple.com" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Contrasenya</label>
                        <input type="password" class="form-control" value="********" readonly>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <button type="button" class="btn btn-primary">
                            Canviar Contrasenya
                        </button>

                        <button type="button" class="btn btn-link text-danger text-decoration-none fw-bold">
                            <i class="bi bi-trash"></i> Borrar compte
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
