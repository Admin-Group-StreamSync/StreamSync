    <style>
        .sidebar-link {

        }
        .sidebar-link:hover {
            background-color: #e9ecef;
        }
        .sidebar-link.active {
            background-color: #dee2e6;

        /* Ajuste para que el contenido principal no se pegue al sidebar */
        .card-gustos {

    </style>
</head>
