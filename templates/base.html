<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Mi Aplicación</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
   <style>
       /* Ajuste extra para centrar el login perfectamente */
       body {
           background-color: #f8f9fa;
           min-height: 100vh;
           display: flex;
           flex-direction: column;
       }
       .main-container {
           flex: 1;
           display: flex;
           align-items: center;
           justify-content: center;
       }
   </style>
</head>
<body>
   <main class="main-container">
       <div class="card p-4 shadow border-0" style="width: 100%; max-width: 350px;">
           <div class="text-center mb-4">
               <i class="bi bi-person-circle fs-1" aria-hidden="true"></i>
               <div class="visually-hidden">Imatge de perfil</div>
           </div>

           <form method="post">
               {% csrf_token %}
               <div class="mb-3">
                   <input type="text" class="form-control" placeholder="USUARI">
               </div>
               <div class="mb-4">
                   <input type="password" class="form-control" placeholder="CONTRASENYA">
               </div>

               <div class="text-center mb-3">
                   <a href="{% url 'crear_cuenta' %}" class="text-decoration-none small fw-bold text-primary">
                       CREAR COMPTA
                   </a>
               </div>
               <button type="submit" class="btn btn-primary w-100 fw-bold">LOG IN</button>
           </form>
       </div>
   </main>


   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
