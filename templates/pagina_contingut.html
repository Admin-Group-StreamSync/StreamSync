<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSync - Exemple de Contingut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        /* Estilos personalizados para la maquetación */
        body {
            background-color: #f8f9fa; /* Un fondo gris muy claro */
        }

        /* Simulación de la portada */
        .portada-placeholder {
            background-color: #e9ecef;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            height: 400px; /* Altura de ejemplo para la portada */
            margin-bottom: 1rem;
        }

        /* Estilo para las estrellas de valoración */
        .stars-gold {
            color: #ffc107; /* Color dorado de Bootstrap para las estrellas */
        }

        /* Ajustes para la sección de comentarios */
        .comentario-avatar {
            color: #6c757d;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'pagina_principal' %}" aria-label="Inici" title="Inici">
                <i class="bi bi-house"></i>
            </a>

            <div class="input-group mx-3 mb-0" style="max-width: 300px;">
                <input type="text" class="form-control" placeholder="Cercar contingut..." aria-label="Cercar" aria-describedby="button-addon2">
                <button class="btn btn-primary" type="button" id="button-addon2">
                    <i class="bi bi-search"></i>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'llistes' %}">Llistes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Series</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pelicules</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pagina_perfil1' %}" aria-label="Perfil" title="Perfil">
                            <i class="bi bi-person-circle"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">

        <div class="d-flex align-items-center mb-4">
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm me-3" title="Tornar enrere">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h1 class="display-5 fw-bold mb-0">Nom de la Pel·lícula / Sèrie</h1>
        </div>

        <div class="row">

            <div class="col-md-4 text-center">
                <div class="portada-placeholder shadow">
                    <i class="bi bi-image fs-1"></i>
                    </div>

                <ul class="list-unstyled text-start mt-3 ps-2">
                    <li class="mb-1"><strong>Gènere:</strong> Aventura</li>
                    <li class="mb-1"><strong>Director:</strong> Christopher Nolan</li>
                    <li><strong>Etiqueta d'edat:</strong> +13</li>
                </ul>
            </div>

            <div class="col-md-8 ps-md-5">

                <div class="mb-5">
                    <h3 class="fw-bold mb-3">Sinopsi</h3>
                    <p class="lead text-muted">Descripció pelicula</p>
                </div>

                <div class="mb-5 p-3 bg-white rounded shadow-sm border">
                    <h4 class="fw-bold mb-3">Valoració general</h4>
                    <div class="d-flex align-items-center">
                        <div class="stars-gold fs-2 me-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-half"></i>
                        </div>
                        <span class="fs-4 fw-bold">4.5 / 5</span>
                    </div>
                </div>

                <div>
                    <h4 class="fw-bold mb-4">Comentaris de usuaris</h4>

                    <div class="d-flex mb-4">
                        <i class="bi bi-person-circle fs-1 comentario-avatar me-3"></i>
                        <div class="flex-grow-1 p-3 bg-white rounded border shadow-sm">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="mb-0 fw-bold">UsuariExemple1</h6>
                                <div class="stars-gold small">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star"></i>
                                </div>
                            </div>
                            <p class="mb-0 text-muted">Comentari1</p>
                        </div>
                    </div>

                    <div class="d-flex mb-4">
                        <i class="bi bi-person-circle fs-1 comentario-avatar me-3"></i>
                        <div class="flex-grow-1 p-3 bg-white rounded border shadow-sm">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="mb-0 fw-bold">UsuariExemple2</h6>
                                <div class="stars-gold small">
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-fill"></i>
                                    <i class="bi bi-star-half"></i>
                                    <i class="bi bi-star"></i>
                                </div>
                            </div>
                            <p class="mb-0 text-muted">Comentari2</p>
                        </div>
                    </div>

                </div>

            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
