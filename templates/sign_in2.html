<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSync - Selecció de Gustos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .card-gustos {
            width: 100%;
            max-width: 850px; /* Un poco más ancho para que las 4 columnas respiren */
        }
        /* Ajuste para que los checkboxes y etiquetas no se amontonen */
        .form-check {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Inicio</a>
            <div class="navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Llistes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Series</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pelicules</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Perfil</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="card card-gustos p-4 shadow border-0">
            <h2 class="text-center fw-bold mb-4">CREAR COMPTA</h2>

            <form method="post">
                {% csrf_token %}

                <p class="fw-bold mb-3">PLATAFORMES:</p>
                <div class="row row-cols-4 g-3 mb-4">
                    <script>
                        for (let i = 1; i <= 16; i++) {
                            document.write(`
                                <div class="col">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="plat${i}" id="plat${i}">
                                        <label class="form-check-label" for="plat${i}">
                                            Plataforma ${i}
                                        </label>
                                    </div>
                                </div>
                            `);
                        }
                    </script>
                </div>

                <hr class="my-4">

                <p class="fw-bold mb-3">GENERES:</p>
                <div class="row row-cols-4 g-3 mb-4">
                    <script>
                        for (let i = 1; i <= 16; i++) {
                            document.write(`
                                <div class="col">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="gen${i}" id="gen${i}">
                                        <label class="form-check-label" for="gen${i}">
                                            Genere ${i}
                                        </label>
                                    </div>
                                </div>
                            `);
                        }
                    </script>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold">
                        SEGÜENT
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
