<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StreamSync Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        :root {
            --deep-black:  #0D1321;
            --navy:        #1D2D44;
            --steel:       #3E5C76;
            --slate:       #748CAB;
            --cream:       #F0EBD8;
            --text-muted:  #9aafc4;
            --border:      rgba(116, 140, 171, 0.2);
        }

        body {
            background-color: var(--deep-black);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--cream);
            min-height: 100vh;
        }

        .navbar-manager {
            background: linear-gradient(90deg, var(--navy) 0%, var(--steel) 100%);
            padding: 12px 0;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--border);
        }

        .brand-logo {
            color: var(--cream);
            font-weight: 800;
            font-size: 1.4rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
            transition: opacity 0.2s ease;
        }
        .brand-logo:hover {
            color: var(--cream);
            opacity: 0.85;
        }

        .profile-btn {
            background: rgba(240, 235, 216, 0.15);
            color: var(--cream);
            border: 1px solid rgba(240, 235, 216, 0.2);
            border-radius: 50px;
            padding: 6px 16px 6px 6px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s ease;
        }
        .profile-btn:hover {
            background: rgba(240, 235, 216, 0.25);
            color: var(--cream);
        }
        .profile-btn img {
            border-radius: 50%;
            width: 28px;
            height: 28px;
            object-fit: cover;
        }

        /* Dropdown */
        .dropdown-menu {
            background-color: var(--navy) !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
        }
        .dropdown-header {
            color: var(--text-muted) !important;
            font-size: 0.8rem;
        }
        .dropdown-divider {
            border-color: var(--border) !important;
        }
        .dropdown-item {
            color: var(--cream) !important;
            transition: background 0.2s;
        }
        .dropdown-item:hover {
            background: rgba(116, 140, 171, 0.15) !important;
            color: var(--cream) !important;
        }
        .dropdown-item.text-danger {
            color: #e57373 !important;
        }
        .dropdown-item.text-danger:hover {
            background: rgba(229, 115, 115, 0.1) !important;
            color: #ef9a9a !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-manager sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{% url 'dashboard_manager' request.user.profile.manager_de %}" class="brand-logo">
                <i class="bi bi-collection-play-fill fs-3" style="color: var(--slate);"></i> StreamSync
            </a>

            <div class="dropdown">
                <button class="profile-btn dropdown-toggle" type="button" id="profileMenu"
                        data-bs-toggle="dropdown" aria-expanded="false">
                    <img src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=1D2D44&color=F0EBD8" alt="Avatar">
                    Manager
                </button>
                <ul class="dropdown-menu dropdown-menu-end rounded-3 mt-2" aria-labelledby="profileMenu">
                    <li>
                        <h6 class="dropdown-header">
                            {{ request.user.username }} ({{ request.user.profile.manager_de }})
                        </h6>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form action="{% url 'logout' %}" method="post" class="px-2">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item text-danger rounded fw-bold">
                                <i class="bi bi-box-arrow-right me-2"></i> Sign Out
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
