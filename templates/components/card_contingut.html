<div class="col">
    <a href="{% url 'pagina_contingut' item.tipus item.id %}" class="text-decoration-none">
        <div class="card h-100 border-0 rounded-4 overflow-hidden card-hover-effect">
            <div class="position-relative" style="aspect-ratio: 2/3; background-color: var(--deep-black);">
                <img src="{{ item.imatge }}" class="card-img-top w-100 h-100" alt="{{ item.titol }}" style="object-fit: cover;">

                <!-- Plataformes -->
                <div class="position-absolute top-0 start-0 m-2 d-flex flex-column gap-1">
                    {% if item.plataformes_disponibles %}
                        {% for plat in item.plataformes_disponibles %}
                            <span class="badge rounded-pill shadow-sm
                                {% if plat == 'CinePlus' %}bg-cineplus
                                {% elif plat == 'StreamHub' %}bg-streamhub
                                {% elif plat == 'PlayMax' %}bg-playmax
                                {% else %}bg-secondary{% endif %}"
                                style="font-size: 0.7rem; padding: 5px 10px;">
                                {{ plat }}
                            </span>
                        {% endfor %}
                    {% else %}
                        <span class="badge rounded-pill shadow-sm
                            {% if item.plataforma == 'CinePlus' %}bg-cineplus
                            {% elif item.plataforma == 'StreamHub' %}bg-streamhub
                            {% elif item.plataforma == 'PlayMax' %}bg-playmax
                            {% else %}bg-secondary{% endif %}"
                            style="font-size: 0.7rem; padding: 5px 10px;">
                            {{ item.plataforma }}
                        </span>
                    {% endif %}
                </div>

                <!-- Rating -->
                <div class="position-absolute top-0 end-0 m-2">
                    <span class="badge rounded-pill" style="background: rgba(13,19,33,0.8); color: var(--cream);">
                        <i class="bi bi-star-fill" style="color: #f0c040;"></i> {{ item.rating }}
                    </span>
                </div>
            </div>

            <div class="card-body p-3" style="background: var(--navy);">
                <h6 class="card-title fw-bold mb-1 text-truncate" style="color: var(--cream);">{{ item.titol }}</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="small" style="color: var(--text-muted);">{{ item.any }} • {{ item.genere_nom|default:item.genre_id }}</span>
                    <span class="badge fw-normal"
                          style="font-size: 0.7rem; border: 1px solid var(--border-color); color: var(--text-secondary); background: var(--bg-surface);">
                        {{ item.edat_nom|default:item.age_rating_id }}
                    </span>
                </div>
            </div>
        </div>
    </a>
</div>

<style>
    .bg-cineplus   { background-color: #c0533a !important; color: white; }
    .bg-streamhub  { background-color: #3e7c8a !important; color: white; }
    .bg-playmax    { background-color: var(--steel) !important; color: var(--cream); }

    .card-hover-effect {
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        border: 1px solid var(--border-color) !important;
    }
    .card-hover-effect:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4) !important;
        border-color: var(--slate) !important;
    }
</style>
