<div class="col">
    <a href="{% url 'pagina_contingut' item.tipus item.id %}" class="text-decoration-none text-dark">
        <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden card-hover-effect">
            <div class="position-relative" style="aspect-ratio: 2/3; background-color: #222;">
                <img src="{{ item.imatge }}" class="card-img-top w-100 h-100" alt="{{ item.titol }}" style="object-fit: cover;">

                <div class="position-absolute top-0 start-0 m-2">
                    <span class="badge rounded-pill shadow-sm
                        {% if item.plataforma == 'CinePlus' %} bg-cineplus
                        {% elif item.plataforma == 'StreamHub' %} bg-streamhub
                        {% elif item.plataforma == 'PlayMax' %} bg-playmax
                        {% else %} bg-secondary {% endif %}"
                        style="font-size: 0.7rem; padding: 5px 10px;">
                        {{ item.plataforma }}
                    </span>
                </div>

                <div class="position-absolute top-0 end-0 m-2">
                    <span class="badge bg-dark bg-opacity-75 rounded-pill">
                        <i class="bi bi-star-fill text-warning"></i> {{ item.rating }}
                    </span>
                </div>
            </div>

            <div class="card-body p-3">
                <h6 class="card-title fw-bold mb-1 text-truncate">{{ item.titol }}</h6>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="text-muted small">{{ item.any }} • {{ item.genere_nom|default:item.genre_id }}</span>
                    <span class="badge border text-dark fw-normal" style="font-size: 0.7rem;">{{ item.edat_nom|default:item.age_rating_id }}</span>
                </div>
            </div>
        </div>
    </a>
</div>

<style>
    /* Nous Colors Corporatius */
    .bg-cineplus { background-color: #ff5722 !important; color: white; }
    .bg-streamhub { background-color: #00bcd4 !important; color: white; }
    .bg-playmax { background-color: #8e44ad !important; color: white; }

    .card-hover-effect {
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }
    .card-hover-effect:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
    }
</style>
