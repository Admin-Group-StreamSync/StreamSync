{% extends "base.html" %}

{% block title %}Create New List - StreamSync{% endblock %}

{% block extra_css %}
<style>
    .create-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        padding: 40px 0;
    }

    .create-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 32px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        transition: box-shadow 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* ✅ Efecte de brillantor de fons */
    .create-card::before {
        content: '';
        position: absolute;
        top: -80px;
        right: -80px;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(116, 140, 171, 0.1) 0%, transparent 70%);
        pointer-events: none;
    }

    .create-card::after {
        content: '';
        position: absolute;
        bottom: -80px;
        left: -80px;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(62, 92, 118, 0.1) 0%, transparent 70%);
        pointer-events: none;
    }

    /* ✅ Header icon animat */
    .header-icon {
        width: 80px;
        height: 80px;
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        transition: all 0.3s ease;
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-8px); }
    }

    .header-icon:hover {
        border-color: var(--accent);
        box-shadow: 0 0 20px rgba(116, 140, 171, 0.2);
    }

    /* ✅ Inputs */
    .form-control-figma {
        background: var(--bg-surface);
        border: 2px solid var(--border-color);
        border-radius: 16px;
        padding: 15px 20px;
        font-weight: 600;
        color: var(--highlight);
        transition: all 0.3s ease;
        width: 100%;
    }

    .form-control-figma::placeholder {
        color: var(--text-muted);
    }

    .form-control-figma:focus {
        background: var(--bg-card);
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(116, 140, 171, 0.15);
        outline: none;
        color: var(--highlight);
    }

    /* ✅ Icon selector */
    .icon-selector input[type="radio"] { display: none; }

    .icon-box {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        border: 2px solid var(--border-color);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: var(--text-secondary);
        background: var(--bg-surface);
    }

    .icon-box:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: scale(1.05);
    }

    .icon-selector input[type="radio"]:checked + .icon-box {
        border-color: var(--accent);
        background: rgba(116, 140, 171, 0.15);
        color: var(--highlight);
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(116, 140, 171, 0.2);
    }

    /* ✅ Color picker */
    .color-input-wrapper {
        width: 100%;
        height: 56px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid var(--border-color);
        position: relative;
        transition: border-color 0.2s;
    }

    .color-input-wrapper:hover {
        border-color: var(--accent);
    }

    input[type="color"] {
        position: absolute;
        top: -10px;
        left: -10px;
        width: 120%;
        height: 120%;
        cursor: pointer;
        border: none;
    }

    /* ✅ Botó crear */
    .btn-create {
        background: var(--primary-gradient);
        border: none;
        color: var(--highlight);
        padding: 16px;
        border-radius: 16px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    /* ✅ Shimmer effect al botó */
    .btn-create::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(240, 235, 216, 0.15), transparent);
        transition: left 0.5s ease;
    }

    .btn-create:hover::before {
        left: 100%;
    }

    .btn-create:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(62, 92, 118, 0.4);
        color: var(--highlight);
    }

    .btn-create:active {
        transform: translateY(0);
    }

    /* ✅ Botó tornar */
    .btn-back-link {
        color: var(--text-secondary);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.2s;
        display: block;
        text-align: center;
        padding: 10px;
    }

    .btn-back-link:hover {
        color: var(--highlight);
    }

    /* ✅ Labels */
    .field-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 8px;
        display: block;
    }

    /* ✅ Preview de la llista */
    .list-preview {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 15px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 20px;
        transition: all 0.3s;
    }

    .preview-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: background 0.3s;
    }
</style>
{% endblock %}

{% block content %}
<div class="container create-wrapper">
    <div class="row justify-content-center w-100">
        <div class="col-lg-5 col-md-8">
            <div class="create-card p-5">

                <!-- Header -->
                <div class="text-center mb-5">
                    <div class="header-icon">
                        <i class="bi bi-folder-plus fs-2" style="color: var(--accent);"></i>
                    </div>
                    <h2 class="fw-bold" style="color: var(--highlight);">New List</h2>
                    <p style="color: var(--text-secondary);">Organize your favorite content</p>
                </div>

                <form method="POST" id="createForm">
                    {% csrf_token %}

                    <!-- Nom -->
                    <div class="mb-4">
                        <label class="field-label">List name</label>
                        <input type="text" name="nom" id="listName"
                               class="form-control-figma"
                               placeholder="Ex: Movies for the weekend"
                               oninput="updatePreview()" required>
                    </div>

                    <!-- Icona -->
                    <div class="mb-4">
                        <label class="field-label">Choose an icon</label>
                        <div class="d-flex justify-content-between icon-selector">
                            <label>
                                <input type="radio" name="icona" value="bi-star-fill" checked onchange="updatePreview()">
                                <div class="icon-box"><i class="bi bi-star-fill fs-4"></i></div>
                            </label>
                            <label>
                                <input type="radio" name="icona" value="bi-heart-fill" onchange="updatePreview()">
                                <div class="icon-box"><i class="bi bi-heart-fill fs-4"></i></div>
                            </label>
                            <label>
                                <input type="radio" name="icona" value="bi-rocket-takeoff-fill" onchange="updatePreview()">
                                <div class="icon-box"><i class="bi bi-rocket-takeoff-fill fs-4"></i></div>
                            </label>
                            <label>
                                <input type="radio" name="icona" value="bi-lightning-fill" onchange="updatePreview()">
                                <div class="icon-box"><i class="bi bi-lightning-fill fs-4"></i></div>
                            </label>
                            <label>
                                <input type="radio" name="icona" value="bi-bookmark-fill" onchange="updatePreview()">
                                <div class="icon-box"><i class="bi bi-bookmark-fill fs-4"></i></div>
                            </label>
                        </div>
                    </div>

                    <!-- Color -->
                    <div class="mb-4">
                        <label class="field-label">Folder color</label>
                        <div class="color-input-wrapper">
                            <input type="color" name="color" id="colorPicker"
                                   value="#3e5c76" oninput="updatePreview()">
                        </div>
                        <div class="small text-center mt-2" style="color: var(--text-muted);">
                            This color will be applied to your list
                        </div>
                    </div>

                    <!-- ✅ Preview en temps real -->
                    <div class="list-preview mb-4" id="listPreview">
                        <div class="preview-icon" id="previewIcon"
                             style="background: rgba(62, 92, 118, 0.2);">
                            <i class="bi bi-star-fill" id="previewIconClass"
                               style="color: #3e5c76;"></i>
                        </div>
                        <div>
                            <div class="fw-bold" id="previewName"
                                 style="color: var(--highlight);">My new list</div>
                            <div class="small" style="color: var(--text-secondary);">0 items</div>
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn-create shadow">
                            <i class="bi bi-plus-circle me-2"></i>Create List
                        </button>
                        <a href="{% url 'llistes' %}" class="btn-back-link">
                            <i class="bi bi-arrow-left me-1"></i> Go back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function updatePreview() {
        const name = document.getElementById('listName').value || 'My new list';
        const color = document.getElementById('colorPicker').value;
        const selectedIcon = document.querySelector('input[name="icona"]:checked');
        const iconClass = selectedIcon ? selectedIcon.value : 'bi-star-fill';

        document.getElementById('previewName').innerText = name;
        document.getElementById('previewIconClass').className = `bi ${iconClass}`;
        document.getElementById('previewIconClass').style.color = color;
        document.getElementById('previewIcon').style.background = color + '30';
    }

    updatePreview();
</script>
{% endblock %}
